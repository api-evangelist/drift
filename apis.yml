    data:
      - Premium from $2,500/mo ($30K/year)
      - Advanced $4,500-$6,000/month
      - Enterprise $8,000-$15,000+/month
      - 'Additional seats: $50-$100/agent/month'
      - Annual contracts only (no monthly)
      - Drift AI conversational chatbot
