        - name: result
          type: object
          value: $.
      - name: get-contacts
        method: GET
        description: Drift List contacts by externalId
        inputParameters:
        - name: idType
          in: query
          type: string
        - name: id
          in: query
          type: string
          description: Your unique externalId
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
